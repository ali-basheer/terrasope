<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terrasope</title>
<meta name="description" content="Terrasope. Critical-mineral sensing. Concept stage. A Craftpine company.">
<meta name="robots" content="noindex">
<meta property="og:title" content="Terrasope">
<meta property="og:description" content="Critical-mineral sensing. Concept stage.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://terrasope.com">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500&family=Newsreader:opsz,wght@6..72,400;6..72,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #f8f9fa;
    --ink: #0f1419;
    --muted: #525a65;
    --accent: #0d6e4f;
    --rule: rgba(0,0,0,0.08);
  }
  html, body { height: 100%; }
  body {
    font-family: 'Instrument Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    line-height: 1.6;
  }
  main { max-width: 30rem; width: 100%; }
  h1 {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500;
    font-size: clamp(2rem, 6vw, 2.75rem);
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--ink);
  }
  .line {
    margin-top: 1.25rem;
    font-size: 1.0625rem;
    color: var(--ink);
  }
  .meta {
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--rule);
    font-size: 0.9rem;
    color: var(--muted);
  }
  .tag {
    margin-top: 0.75rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  a {
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 2px;
    text-decoration-color: rgba(13,110,79,0.4);
  }
  a:hover { text-decoration-color: var(--accent); }
</style>
</head>
<body>
  <main>
    <h1>Terrasope</h1>
    <p class="line">Critical-mineral sensing. Concept stage.</p>
    <p class="meta"><a href="mailto:hello@craftpine.com">hello@craftpine.com</a></p>
    <p class="tag">A Craftpine company.</p>
  </main>
</body>
</html>
